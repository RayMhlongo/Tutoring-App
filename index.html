<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>EduPulse by Ray</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
  <link rel="icon" type="image/png" href="./icons/icon-192x192.png">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <div id="bootError" class="boot-error" hidden>
    <h2>EduPulse failed to start</h2>
    <p id="bootErrorText"></p>
  </div>
  <script>
    window.addEventListener('error', function (e) {
      var panel = document.getElementById('bootError');
      var text = document.getElementById('bootErrorText');
      if (panel && text) {
        panel.hidden = false;
        text.textContent = e && e.message ? e.message : 'Unknown startup error';
      }
    });
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
