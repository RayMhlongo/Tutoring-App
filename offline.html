<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>EduPulse Offline</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#0b1220;color:#e6f0ff;display:grid;place-items:center;min-height:100vh;margin:0;padding:1rem}
    .card{max-width:420px;background:#132136;border:1px solid #2b3f60;border-radius:14px;padding:1rem}
    h1{margin:0 0 .5rem;font-size:1.1rem}
    p{margin:.4rem 0;color:#b8c7dd;font-size:.92rem}
  </style>

<body>
  <section class="card">
    <h1>EduPulse is offline</h1>
    <p>Your app data is still available locally on this device.</p>
    <p>Reconnect to sync updates and cloud backups.</p>
  </section>

</html>
