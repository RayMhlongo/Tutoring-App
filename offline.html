<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Offline | X-Factor Tutoring</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;min-height:100vh;display:grid;place-items:center;background:#f7fbff;color:#0e3a67}
    .box{max-width:420px;padding:24px;border-radius:18px;background:#fff;border:1px solid #d8e7f3;box-shadow:0 8px 24px rgba(8,46,84,.08);text-align:center}
    h1{margin:0 0 10px;font-size:1.3rem}
    p{margin:0;color:#4f647a}
  </style>
</head>
<body>
  <section class="box">
    <h1>You are offline</h1>
    <p>The app shell is still available. Your changes are saved locally and will sync when the connection returns.</p>
  </section>
</body>
</html>
