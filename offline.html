<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduPulse Offline</title>
  <style>
    body{font-family:Segoe UI,sans-serif;background:#0d1420;color:#eef4ff;margin:0;display:grid;place-items:center;min-height:100vh;padding:1rem}
    .card{max-width:420px;border:1px solid #32445a;border-radius:14px;padding:1rem;background:#132031}
    h1{margin:0 0 .5rem;font-size:1.3rem}
    p{margin:.4rem 0;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <h1>EduPulse is offline</h1>
    <p>Your data remains on this device and saves locally.</p>
    <p>Reconnect to process queued cloud backups.</p>
  </div>
</body>
</html>
