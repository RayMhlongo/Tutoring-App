<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0e3a67">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles/theme.css">
  <link rel="stylesheet" href="./styles/main.css">
  <title>Tutoring Business Platform Template</title>
</head>
<body>
  <div id="setupRoot"></div>
  <div id="appRoot" hidden>
    <header class="app-header">
      <img id="brandLogo" src="./assets/default-logo/default-logo.svg" alt="logo" class="logo">
      <h1 id="brandName">Tutoring Business</h1>
    </header>
    <nav class="app-nav">
      <button class="nav-btn is-active" data-view="dashboard" type="button">Dashboard</button>
      <button class="nav-btn" data-view="students" type="button">Students</button>
      <button class="nav-btn" data-view="lessons" type="button">Lessons</button>
      <button class="nav-btn" data-view="calendar" type="button">Calendar</button>
      <button class="nav-btn" data-view="settings" type="button">Settings</button>
    </nav>
    <main id="mainView"></main>
  </div>
  <script src="https://unpkg.com/dexie@4/dist/dexie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
