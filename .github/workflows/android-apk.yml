name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets for Capacitor
        run: |
          rm -rf www
          mkdir -p www
          cp index.html manifest.json offline.html service-worker.js www/
          cp -R assets components icons src styles www/

      - name: Ensure Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Apply Android Camera Permission and Branded App Icon
        run: |
          manifest="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android.permission.CAMERA' "$manifest"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.CAMERA" />' "$manifest"
          fi
          if ! grep -q 'android.hardware.camera.any' "$manifest"; then
            sed -i '/<manifest /a\    <uses-feature android:name="android.hardware.camera.any" android:required="false" />' "$manifest"
          fi
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image

          base = Path("android/app/src/main/res")
          main_icon = Image.open("icons/icon-512x512.png").convert("RGBA")
          fg_icon = Image.open("icons/icon-adaptive-foreground.png").convert("RGBA")
          sizes = {
              "mipmap-mdpi": 48,
              "mipmap-hdpi": 72,
              "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144,
              "mipmap-xxxhdpi": 192,
          }
          for folder, size in sizes.items():
              target = base / folder
              target.mkdir(parents=True, exist_ok=True)
              main_icon.resize((size, size), Image.Resampling.LANCZOS).save(target / "ic_launcher.png")
              main_icon.resize((size, size), Image.Resampling.LANCZOS).save(target / "ic_launcher_round.png")
              fg_icon.resize((size, size), Image.Resampling.LANCZOS).save(target / "ic_launcher_foreground.png")
          (base / "values" / "ic_launcher_background.xml").write_text(
              '<resources>\n    <color name="ic_launcher_background">#0e3a67</color>\n</resources>\n',
              encoding="utf-8"
          )
          PY

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-36"
          sdkmanager "build-tools;36.0.0" || sdkmanager "build-tools;35.0.0"

      - name: Configure Android SDK path
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Build Debug APK
        run: |
          set -o pipefail
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ../gradle-build.log

      - name: Collect APK Outputs
        if: success()
        run: |
          mkdir -p apk-artifacts
          find android -type f -name "*.apk" -exec cp {} apk-artifacts/ \;
          ls -la apk-artifacts
          test "$(find apk-artifacts -type f -name '*.apk' | wc -l)" -gt 0

      - name: Upload Gradle Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-build-log
          path: gradle-build.log

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: xfactor-tutoring-debug-apk
          path: apk-artifacts/*.apk
          if-no-files-found: error
