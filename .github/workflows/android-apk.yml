name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets for Capacitor
        run: |
          rm -rf www
          mkdir -p www
          cp index.html manifest.json offline.html service-worker.js www/
          cp -R assets components icons src styles www/

      - name: Ensure Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Normalize Android SDK levels for CI
        run: |
          sed -i 's/compileSdkVersion = 36/compileSdkVersion = 35/' android/variables.gradle
          sed -i 's/targetSdkVersion = 36/targetSdkVersion = 35/' android/variables.gradle

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xfactor-tutoring-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
