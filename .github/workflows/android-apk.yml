name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets for Capacitor
        run: |
          rm -rf www
          mkdir -p www
          cp index.html manifest.json offline.html service-worker.js www/
          cp -R assets components icons src styles www/

      - name: Ensure Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor web assets
        run: npx cap sync android

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-36"
          sdkmanager "build-tools;36.0.0" || sdkmanager "build-tools;35.0.0"

      - name: Configure Android SDK path
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Build Debug APK
        run: |
          set -o pipefail
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee ../gradle-build.log

      - name: Collect APK Outputs
        if: success()
        run: |
          mkdir -p apk-artifacts
          find android -type f -name "*.apk" -exec cp {} apk-artifacts/ \;
          ls -la apk-artifacts
          test "$(find apk-artifacts -type f -name '*.apk' | wc -l)" -gt 0

      - name: Upload Gradle Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-build-log
          path: gradle-build.log

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: xfactor-tutoring-debug-apk
          path: apk-artifacts/*.apk
          if-no-files-found: error
