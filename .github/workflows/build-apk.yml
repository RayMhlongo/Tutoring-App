name: Build APK

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "xfactor-tutoring/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xfactor-tutoring

    env:
      npm_config_cache: ${{ github.workspace }}/xfactor-tutoring/.npm-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: xfactor-tutoring/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build debug APK
        run: |
          npm run sync:android
          chmod +x android/gradlew
          (cd android && ./gradlew assembleDebug)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xfactor-tutoring-debug-apk
          path: xfactor-tutoring/android/app/build/outputs/apk/debug/app-debug.apk
