name: Build APK

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]
    paths:
      - "xfactor-tutoring/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xfactor-tutoring

    env:
      npm_config_cache: ${{ github.workspace }}/xfactor-tutoring/.npm-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: xfactor-tutoring/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build debug APK
        run: |
          npm run sync:android
          python - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          if "android.permission.CAMERA" not in text:
              insert = '\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n'
              text = text.replace("</manifest>", insert + "</manifest>")
              manifest.write_text(text, encoding="utf-8")
          PY
          chmod +x android/gradlew
          (cd android && ./gradlew assembleDebug)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xfactor-tutoring-debug-apk
          path: xfactor-tutoring/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release with APK
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          files: xfactor-tutoring/android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: xfactor-v${{ github.run_number }}
          release_name: X-Factor Tutoring APK v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
